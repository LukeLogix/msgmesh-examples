<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MsgMesh · 即時聊天室範例</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171a21;
        --border: #2a2f3a;
        --text: #e7e9ee;
        --muted: #9aa2b1;
        --accent: #5b8cff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
      }
      main {
        width: min(680px, 100%);
        display: flex;
        flex-direction: column;
        height: 100vh;
        border-inline: 1px solid var(--border);
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { margin: 0; font-size: 16px; }
      #status {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      #status[data-kind="ok"] { color: #4ec9a5; }
      #status[data-kind="error"] { color: #ff7a7a; }
      #status[data-kind="pending"] { color: #e6c07b; }
      #messages {
        flex: 1;
        list-style: none;
        margin: 0;
        padding: 14px 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: baseline;
        padding: 6px 10px;
        border-radius: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
      }
      .msg.mine { border-color: var(--accent); }
      .msg .who { font-weight: 600; font-size: 13px; color: var(--accent); }
      .msg .body { font-size: 14px; word-break: break-word; }
      .msg time { font-size: 11px; color: var(--muted); }
      form {
        display: flex;
        gap: 8px;
        padding: 12px 18px;
        border-top: 1px solid var(--border);
      }
      input, button {
        font: inherit;
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
      }
      #name { width: 130px; }
      #text { flex: 1; }
      button {
        background: var(--accent);
        border-color: var(--accent);
        color: #0b1020;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MsgMesh · 即時聊天室</h1>
        <div id="status" data-kind="pending">初始化中…</div>
      </header>
      <ul id="messages"></ul>
      <form id="composer" autocomplete="off">
        <input id="name" placeholder="暱稱" />
        <input id="text" placeholder="輸入訊息,Enter 送出" />
        <button type="submit">送出</button>
      </form>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
